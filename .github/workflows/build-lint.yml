name: Build & Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v5

      # ----------------------------
      # Backend
      # ----------------------------
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Build & Verify backend
        working-directory: ./backend
        run: mvn clean verify -DskipTests

      - name: Build Docker image
        run: docker build -t bachelor-backend:ci backend

      - name: Compose smoke test
        env:
          COMPOSE_PROJECT_NAME: ci
        run: |
          docker compose -f docker-compose.yml up -d
          bash -c 'for i in {1..60}; do curl -fsS http://localhost:8080/actuator/health && exit 0; sleep 2; done; exit 1'
          docker compose -f docker-compose.yml down

      - name: Dump compose state on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml ps || true
          docker compose -f docker-compose.yml logs --no-color || true

      # ----------------------------
      # Frontend
      # ----------------------------
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Check Prettier formatting
        working-directory: ./frontend
        run: npm run format:check

      - name: Check for Typescript errors
        working-directory: ./frontend
        run: npx tsc --noEmit

