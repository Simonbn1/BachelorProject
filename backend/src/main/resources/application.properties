spring.application.name=BachelorProject

# Server
server.port=8080

# PostgreSQL (Azure)
spring.datasource.url=jdbc:postgresql://timesheet-postgres.postgres.database.azure.com:5432/postgres?sslmode=require
spring.datasource.username=timesheetadmin
spring.datasource.password=simon123!
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=5

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actuator
management.endpoints.web.exposure.include=health,info,mappings

# JWT config
app.jwt.issuer=mock-auth
app.jwt.audience=timesheet-app
app.jwt.access-ttl-seconds=3600
app.jwt.secret=${APP_JWT_SECRET}

# Admin emails
app.auth.admin-emails=admin@example.com