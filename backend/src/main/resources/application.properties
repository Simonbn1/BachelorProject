spring.application.name=BachelorProject

# Server
server.port=8080

# H2 (dev database)
spring.datasource.url=jdbc:h2:mem:timesheetdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# (Valgfritt) litt mer lesbar SQL i logg
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info,mappings

# Mock JWT auth (HS256)
app.jwt.issuer=mock-auth
app.jwt.audience=timesheet-app
# At least 32 chars
app.jwt.secret=CHANGE_ME_TO_A_LONG_RANDOM_SECRET_32CHARS_MINIMUM
# Comma-separated admin emails
app.auth.admin-emails=admin@example.com
